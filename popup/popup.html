<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap"
    />
    <link rel="stylesheet" href="popup.css" />
    <title>Sumly</title>
  </head>
  <body>
    <div id="app" class="theme-dark">
      <header class="header">
        <div class="logo">
          <span class="logo-icon">✒</span>
          <span class="logo-text">Summery</span>
        </div>
        <div class="header-actions">
          <button id="themeToggle" class="icon-btn" aria-label="Toggle theme">☀</button>
          <button id="settingsBtn" class="icon-btn" aria-label="Settings">⚙</button>
        </div>
      </header>

      <div id="pageMeta" class="page-meta hidden">
        <div class="page-title" id="pageTitle"></div>
        <div class="page-stats">
          <span id="wordCount" class="stat"></span>
          <span class="stat-divider">·</span>
          <span id="readingTime" class="stat"></span>
        </div>
      </div>

      <main id="stateArea" class="state-area"></main>

      <footer id="actionBar" class="action-bar hidden">
        <button id="copyBtn" class="action-btn secondary">Copy</button>
        <button id="clearBtn" class="action-btn secondary">Clear</button>
        <button id="summarizeBtn" class="action-btn primary">Summarize</button>
      </footer>

      <div id="settingsPanel" class="settings-panel hidden">
        <div class="settings-header">
          <span>Settings</span>
          <button id="closeSettings" class="icon-btn">✕</button>
        </div>
        <label class="settings-label">Gemini API Key</label>
        <div class="key-input-wrapper">
          <input type="password" id="apiKeyInput" class="settings-input" placeholder="AIza..." />
          <button id="toggleKeyVisibility" class="icon-btn small">👁</button>
        </div>
        <p class="settings-hint">Your key is stored locally on this device only. Never shared.</p>
        <div class="settings-row">
          <label class="settings-label">Summary Mode</label>
          <select id="summaryMode" class="settings-select">
            <option value="full">Full Summary</option>
            <option value="brief">3 Key Points</option>
            <option value="insights">Key Insights Only</option>
          </select>
        </div>
        <div class="settings-row">
          <label class="settings-label">Highlight on page</label>
          <label class="toggle">
            <input type="checkbox" id="highlightToggle" />
            <span class="toggle-track"></span>
          </label>
        </div>
        <button id="saveSettings" class="action-btn primary full-width">Save Settings</button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
